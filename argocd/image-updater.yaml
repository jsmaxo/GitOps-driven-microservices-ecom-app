apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: boutique-image-updater
  namespace: argocd

spec:
  commonUpdateSettings:
    updateStrategy: latest
    allowTags: "regexp:^sha-[a-f0-9]{7,40}$"

  applicationRefs:
    - namePattern: "boutique-*"

      images:
        - alias: adservice
          imageName: ghcr.io/jsmaxo/microservices-demo/adservice

        - alias: cartservice
          imageName: ghcr.io/jsmaxo/microservices-demo/cartservice

        - alias: checkoutservice
          imageName: ghcr.io/jsmaxo/microservices-demo/checkoutservice

        - alias: currencyservice
          imageName: ghcr.io/jsmaxo/microservices-demo/currencyservice

        - alias: emailservice
          imageName: ghcr.io/jsmaxo/microservices-demo/emailservice

        - alias: frontend
          imageName: ghcr.io/jsmaxo/microservices-demo/frontend

        - alias: loadgenerator
          imageName: ghcr.io/jsmaxo/microservices-demo/loadgenerator

        - alias: paymentservice
          imageName: ghcr.io/jsmaxo/microservices-demo/paymentservice

        - alias: productcatalogservice
          imageName: ghcr.io/jsmaxo/microservices-demo/productcatalogservice

        - alias: recommendationservice
          imageName: ghcr.io/jsmaxo/microservices-demo/recommendationservice

        - alias: shippingservice
          imageName: ghcr.io/jsmaxo/microservices-demo/shippingservice